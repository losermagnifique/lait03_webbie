                    <div class="slideshow mySlides modelSlides">

                    <div class="slideshow mySlides modelSlides">

                        src="images/charmod/fdet_vetements.png" />

                </div>
                <a class="prev" onclick="plusSlides('modelSlides', -1)"><i class="fa-solid fa-angle-left fa-2x"></i></a>
